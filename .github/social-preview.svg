<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f3a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-gradient)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="80" x2="1280" y2="80" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="#60a5fa" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="#60a5fa" stroke-width="1"/>
    
    <line x1="160" y1="0" x2="160" y2="640" stroke="#60a5fa" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="#60a5fa" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="#60a5fa" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="#60a5fa" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="#60a5fa" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="#60a5fa" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="#60a5fa" stroke-width="1"/>
  </g>
  
  <!-- Network topology visualization -->
  <g opacity="0.3">
    <!-- Nodes -->
    <circle cx="200" cy="150" r="8" fill="#3b82f6" filter="url(#glow)"/>
    <circle cx="350" cy="120" r="8" fill="#f97316" filter="url(#glow)"/>
    <circle cx="500" cy="180" r="8" fill="#a855f7" filter="url(#glow)"/>
    <circle cx="280" cy="250" r="8" fill="#14b8a6" filter="url(#glow)"/>
    <circle cx="420" cy="280" r="8" fill="#ec4899" filter="url(#glow)"/>
    
    <!-- Connections -->
    <line x1="200" y1="150" x2="350" y2="120" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="350" y1="120" x2="500" y2="180" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="200" y1="150" x2="280" y2="250" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="280" y1="250" x2="420" y2="280" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
    <line x1="350" y1="120" x2="420" y2="280" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Terminal window mockup -->
  <g transform="translate(750, 100)">
    <!-- Window frame -->
    <rect x="0" y="0" width="480" height="300" rx="8" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    
    <!-- Window title bar -->
    <rect x="0" y="0" width="480" height="32" rx="8" fill="#1e293b"/>
    <circle cx="16" cy="16" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="36" cy="16" r="5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="56" cy="16" r="5" fill="#10b981" opacity="0.8"/>
    
    <!-- Terminal text -->
    <text x="20" y="60" font-family="'JetBrains Mono', monospace" font-size="13" fill="#22c55e" opacity="0.9">
      $ ssh node-01.local
    </text>
    <text x="20" y="85" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94a3b8" opacity="0.8">
      Connected to node-01
    </text>
    <text x="20" y="110" font-family="'JetBrains Mono', monospace" font-size="13" fill="#60a5fa" opacity="0.8">
      CPU: 12.3% | MEM: 2.1G/16G
    </text>
    <text x="20" y="135" font-family="'JetBrains Mono', monospace" font-size="13" fill="#60a5fa" opacity="0.8">
      DISK: 45.2G/256G | NET: ↑2.3MB/s
    </text>
    <text x="20" y="175" font-family="'JetBrains Mono', monospace" font-size="13" fill="#a855f7" opacity="0.8">
      Docker: 12 containers running
    </text>
    <text x="20" y="200" font-family="'JetBrains Mono', monospace" font-size="13" fill="#14b8a6" opacity="0.8">
      WireGuard: 5 peers connected
    </text>
    <text x="20" y="240" font-family="'JetBrains Mono', monospace" font-size="13" fill="#22c55e" opacity="0.9">
      $ █
    </text>
  </g>
  
  <!-- Main title -->
  <g transform="translate(100, 380)">
    <text x="0" y="0" font-family="'Inter', 'Jost', sans-serif" font-size="96" font-weight="800" fill="#f8fafc" letter-spacing="-2">
      Computerzentrale
    </text>
    <text x="4" y="60" font-family="'Inter', sans-serif" font-size="28" font-weight="400" fill="#94a3b8" opacity="0.9">
      Infrastructure monitoring, beautifully crafted
    </text>
  </g>
  
  <!-- Feature pills -->
  <g transform="translate(100, 500)">
    <!-- SSH Terminal -->
    <rect x="0" y="0" width="140" height="36" rx="18" fill="#1e293b" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>
    <text x="70" y="23" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#60a5fa" text-anchor="middle">
      SSH Terminal
    </text>
    
    <!-- Docker -->
    <rect x="160" y="0" width="100" height="36" rx="18" fill="#1e293b" stroke="#a855f7" stroke-width="2" opacity="0.8"/>
    <text x="210" y="23" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#c084fc" text-anchor="middle">
      Docker
    </text>
    
    <!-- WireGuard -->
    <rect x="280" y="0" width="120" height="36" rx="18" fill="#1e293b" stroke="#14b8a6" stroke-width="2" opacity="0.8"/>
    <text x="340" y="23" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#5eead4" text-anchor="middle">
      WireGuard
    </text>
    
    <!-- Agentless -->
    <rect x="420" y="0" width="120" height="36" rx="18" fill="#1e293b" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
    <text x="480" y="23" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#86efac" text-anchor="middle">
      Agentless
    </text>
    
    <!-- 35 Themes -->
    <rect x="560" y="0" width="120" height="36" rx="18" fill="#1e293b" stroke="#ec4899" stroke-width="2" opacity="0.8"/>
    <text x="620" y="23" font-family="'Inter', sans-serif" font-size="14" font-weight="600" fill="#f9a8d4" text-anchor="middle">
      35 Themes
    </text>
  </g>
  
  <!-- Status indicator -->
  <g transform="translate(100, 570)">
    <circle cx="6" cy="6" r="6" fill="#22c55e" filter="url(#glow-strong)"/>
    <text x="20" y="11" font-family="'Inter', sans-serif" font-size="14" font-weight="500" fill="#86efac">
      Online • Real-time monitoring via WebSocket
    </text>
  </g>
  
  <!-- Accent line -->
  <rect x="100" y="350" width="120" height="4" rx="2" fill="#3b82f6" filter="url(#glow)"/>
</svg>
