<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Deep navy background with subtle rounded corners -->
  <rect width="32" height="32" rx="4" fill="#0a0f1a"/>
  <!-- Accent border glow effect -->
  <rect x="1" y="1" width="30" height="30" rx="3" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
  <!-- Bold C monogram -->
  <text x="16" y="22" font-size="18" font-weight="700"
        text-anchor="middle" fill="#3b82f6" font-family="system-ui, -apple-system, sans-serif">C</text>
</svg>
